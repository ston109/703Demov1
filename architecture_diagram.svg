<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1140" viewBox="0 0 1600 1140" role="img" aria-labelledby="title desc">
  <title id="title">703DEMOV1 Current System Architecture</title>
  <desc id="desc">Clean architecture diagram for the 703DEMOV1 compound AI cart-abandonment recovery agent.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#24475a" />
    </marker>
    <style>
      .bg { fill: #f6f9fb; }
      .panel { fill: #fff; stroke: #c7d4de; stroke-width: 2; rx: 16; }
      .box { fill: #fff; stroke-width: 1.7; rx: 10; }
      .blue { fill: #e9f3ff; stroke: #548bbd; }
      .green { fill: #edf8f0; stroke: #5a9b70; }
      .orange { fill: #fff4e8; stroke: #c98a45; }
      .purple { fill: #f3efff; stroke: #8269b8; }
      .red { fill: #fff0f0; stroke: #c66c6c; }
      .gray { fill: #f2f5f7; stroke: #81909b; }
      .title { font: 800 34px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #526879; }
      .panel-title { font: 800 25px Arial, sans-serif; fill: #123047; }
      .text { font: 700 17px Arial, sans-serif; fill: #173449; }
      .small { font: 400 13.5px Arial, sans-serif; fill: #405767; }
      .tiny { font: 400 12.5px Arial, sans-serif; fill: #526875; }
      .arrow { stroke: #24475a; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
      .flow-dot { fill: #24475a; stroke: #fff; stroke-width: 3; }
      .flow-num { font: 800 15px Arial, sans-serif; fill: #fff; text-anchor: middle; dominant-baseline: central; }
      .legend-card { fill: #fff; stroke: #d6e0e7; stroke-width: 1.5; rx: 12; }
      .legend-title { font: 800 20px Arial, sans-serif; fill: #123047; }
      .legend-text { font: 400 14px Arial, sans-serif; fill: #405767; }
      .chip { fill: #eef5fa; stroke: #c9d7e1; stroke-width: 1.2; rx: 8; }
      .chip-title { font: 800 13px Arial, sans-serif; fill: #24475a; }
      .chip-text { font: 400 12.5px Arial, sans-serif; fill: #405767; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1140" />
  <text x="60" y="58" class="title">703DEMOV1 Compound AI Cart-Abandonment Agent</text>
  <text x="60" y="88" class="subtitle">Simulated shopping web + shopping backend gateway + AGI backend brain + bounded Gemini risk scorer</text>

  <!-- Shopping Frontend -->
  <rect class="panel" x="50" y="130" width="420" height="650" />
  <text x="85" y="172" class="panel-title">Shopping Frontend</text>
  <text x="85" y="198" class="subtitle">online_shopping_web/frontend/src</text>

  <rect class="box blue" x="85" y="235" width="350" height="72" />
  <text x="110" y="263" class="text">React Routes / Pages</text>
  <text x="110" y="286" class="small">Login, products, detail, cart, checkout</text>

  <rect class="box blue" x="85" y="330" width="350" height="76" />
  <text x="110" y="358" class="text">Product Subpage Requests</text>
  <text x="110" y="381" class="small">Info, shipping, merchant, reviews, warranty</text>

  <rect class="box purple" x="85" y="430" width="350" height="92" />
  <text x="110" y="458" class="text">Tracking Runtime</text>
  <text x="110" y="481" class="small">agiClient.ts + usePageTracking.ts</text>
  <text x="110" y="502" class="small">deviceId, sessionId, behavioural events</text>

  <rect class="box green" x="85" y="546" width="350" height="94" />
  <text x="110" y="574" class="text">AgiActionRuntime</text>
  <text x="110" y="597" class="small">Frontend allowlist, score threshold &lt;= 80</text>
  <text x="110" y="618" class="small">30s cooldown, duplicate filtering</text>

  <rect class="box orange" x="85" y="664" width="350" height="76" />
  <text x="110" y="692" class="text">Visible Safe Actions</text>
  <text x="110" y="715" class="small">Support, banners, recommendations</text>

  <!-- Shopping Backend -->
  <rect class="panel" x="590" y="130" width="420" height="650" />
  <text x="625" y="172" class="panel-title">Shopping Backend</text>
  <text x="625" y="198" class="subtitle">online_shopping_web/backend/app.py</text>

  <rect class="box blue" x="625" y="235" width="350" height="78" />
  <text x="650" y="263" class="text">Auth + Account Isolation</text>
  <text x="650" y="286" class="small">Register, login, user validation</text>
  <text x="650" y="305" class="small">X-Demo-User controls cart ownership</text>

  <rect class="box blue" x="625" y="337" width="350" height="82" />
  <text x="650" y="365" class="text">Catalog + Product APIs</text>
  <text x="650" y="388" class="small">Catalog and section APIs</text>
  <text x="650" y="407" class="small">Info, shipping, merchant, reviews, warranty</text>

  <rect class="box green" x="625" y="443" width="350" height="92" />
  <text x="650" y="471" class="text">Cart + Checkout Authority</text>
  <text x="650" y="494" class="small">SQLite carts by username</text>
  <text x="650" y="513" class="small">Partial checkout and cart snapshot</text>

  <rect class="box purple" x="625" y="559" width="350" height="112" />
  <text x="650" y="587" class="text">AGI Event Gateway</text>
  <text x="650" y="610" class="small">POST /api/agi/events</text>
  <text x="650" y="629" class="small">Requires login and non-empty cart</text>
  <text x="650" y="648" class="small">Injects cart scope metadata</text>
  <text x="650" y="667" class="small">Returns score and web actions</text>

  <rect class="box gray" x="625" y="704" width="350" height="58" />
  <text x="650" y="730" class="text">shop_data.sqlite</text>
  <text x="650" y="750" class="small">users, password hashes, carts</text>

  <!-- AGI Backend -->
  <rect class="panel" x="1130" y="130" width="420" height="650" />
  <text x="1165" y="172" class="panel-title">AGI Backend + Monitor</text>
  <text x="1165" y="198" class="subtitle">agi/app.py + agi/agent_engine.py</text>

  <rect class="box purple" x="1165" y="235" width="350" height="76" />
  <text x="1190" y="263" class="text">AGI Flask API + Dashboard</text>
  <text x="1190" y="286" class="small">Events, think, feedback, evaluation APIs</text>
  <text x="1190" y="305" class="small">AGI Cart Abandonment Monitor</text>

  <rect class="box orange" x="1165" y="335" width="350" height="88" />
  <text x="1190" y="363" class="text">Risk Signal Provider</text>
  <text x="1190" y="386" class="small">risk_engine.py</text>
  <text x="1190" y="405" class="small">Cart lifecycle, blocker rules, score history</text>

  <rect class="box blue" x="1165" y="447" width="350" height="134" />
  <text x="1190" y="475" class="text">AGIAgent Decision Core</text>
  <text x="1190" y="498" class="small">WorldModel -> BeliefState -> Memory</text>
  <text x="1190" y="517" class="small">Goals -> Reasoning -> Planner</text>
  <text x="1190" y="536" class="small">Tools -> Safety -> ActionExecutor</text>
  <text x="1190" y="555" class="small">Feedback -> Evaluation -> Evolution</text>

  <rect class="box red" x="1165" y="605" width="350" height="84" />
  <text x="1190" y="633" class="text">Safety and Policy Boundary</text>
  <text x="1190" y="656" class="small">No auto-purchase or price changes</text>
  <text x="1190" y="675" class="small">No payment data, email, SMS, false claims</text>

  <rect class="box gray" x="1165" y="722" width="350" height="58" />
  <text x="1190" y="748" class="text">agi_data.sqlite</text>
  <text x="1190" y="768" class="small">sessions, scores, decisions, feedback</text>

  <!-- Main numbered flow. Lines only occupy gutters or lower whitespace. -->
  <path class="arrow" d="M435 476 L590 476" />
  <circle class="flow-dot" cx="520" cy="476" r="18" />
  <text x="520" y="476" class="flow-num">1</text>

  <path class="arrow" d="M975 615 L1130 615" />
  <circle class="flow-dot" cx="1065" cy="615" r="18" />
  <text x="1065" y="615" class="flow-num">2</text>

  <path class="arrow" d="M1130 730 L1040 730 L1040 805 L520 805 L520 595 L435 595" />
  <circle class="flow-dot" cx="1065" cy="730" r="18" />
  <text x="1065" y="730" class="flow-num">3</text>

  <path class="arrow" d="M260 740 L260 815" />
  <circle class="flow-dot" cx="260" cy="790" r="18" />
  <text x="260" y="790" class="flow-num">4</text>

  <!-- Legend and support layer -->
  <rect class="legend-card" x="50" y="825" width="1500" height="275" />
  <text x="85" y="865" class="legend-title">Numbered Flow</text>

  <circle class="flow-dot" cx="92" cy="905" r="16" />
  <text x="92" y="905" class="flow-num">1</text>
  <text x="120" y="900" class="legend-text">Frontend sends behaviour events from</text>
  <text x="120" y="918" class="legend-text">product, cart, checkout, and section pages.</text>

  <circle class="flow-dot" cx="92" cy="955" r="16" />
  <text x="92" y="955" class="flow-num">2</text>
  <text x="120" y="950" class="legend-text">Shopping backend validates login and</text>
  <text x="120" y="968" class="legend-text">attaches the authoritative cart snapshot.</text>

  <circle class="flow-dot" cx="790" cy="905" r="16" />
  <text x="790" y="905" class="flow-num">3</text>
  <text x="818" y="900" class="legend-text">AGI backend returns score and safe webActions.</text>
  <text x="818" y="918" class="legend-text">Frontend runtime renders only allowed actions.</text>

  <circle class="flow-dot" cx="790" cy="955" r="16" />
  <text x="790" y="955" class="flow-num">4</text>
  <text x="818" y="950" class="legend-text">Action feedback is logged for evaluation</text>
  <text x="818" y="968" class="legend-text">and future policy improvement.</text>

  <text x="85" y="1007" class="legend-title">Support Boundaries</text>

  <rect class="chip" x="85" y="1025" width="320" height="50" />
  <text x="105" y="1044" class="chip-title">Cart Scope</text>
  <text x="105" y="1063" class="chip-text">Cart exit starts scoring; clear/checkout resets.</text>

  <rect class="chip" x="430" y="1025" width="320" height="50" />
  <text x="450" y="1044" class="chip-title">Gemini</text>
  <text x="450" y="1063" class="chip-text">Bounded risk multiplier helper, not the brain.</text>

  <rect class="chip" x="775" y="1025" width="340" height="50" />
  <text x="795" y="1044" class="chip-title">SQLite</text>
  <text x="795" y="1063" class="chip-text">shop_data for carts; agi_data for agent logs.</text>

  <rect class="chip" x="1140" y="1025" width="340" height="50" />
  <text x="1160" y="1044" class="chip-title">Safety</text>
  <text x="1160" y="1063" class="chip-text">No auto-purchase, payment data, or external contact.</text>
</svg>
